name: Weekly Market Economist Brief

on:
  schedule:
    - cron: '0 11 * * 6'
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
  REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
  REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research agent
        working-directory: src
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: python agent.py

      - name: Publish charts to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p docs/charts
          if [ -d src/output/charts ]; then
            cp src/output/charts/*.png docs/charts/ 2>/dev/null || true
          fi
          cp src/output/*_browser.html docs/index.html 2>/dev/null || true
          git add docs/
          git diff --staged --quiet || git commit -m "Update weekly brief — $(date +%Y-%m-%d)"
          git push

      - name: Archive report
        uses: actions/upload-artifact@v4
        with:
          name: market-brief-${{ github.run_id }}
          path: src/output/*.html
          retention-days: 90
